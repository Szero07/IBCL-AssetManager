<script>

const Firma = {

    token: null,

    solicitud: null,

    iniciar() {

        this.token = new URLSearchParams(window.location.search).get("token");

        if (!this.token) {

            document.getElementById("contenido").innerHTML =
                "<h2>Solicitud inválida.</h2>";

            return;

        }

        this.cargar();

    },

    cargar() {

        google.script.run

        .withSuccessHandler((solicitud) => {

            if (!solicitud) {

                document.getElementById("contenido").innerHTML =
                    "<h2>La solicitud no existe.</h2>";

                return;

            }

            this.solicitud = solicitud;

            this.dibujarPantalla();

        })

        .withFailureHandler((e) => {

            document.getElementById("contenido").innerHTML =
                "<h2>" + e.message + "</h2>";

        })

        .obtenerSolicitud(this.token);

    },

    dibujarPantalla() {

        const datos = this.solicitud.datos;

        document.getElementById("tituloActa").innerHTML =
            "ACTA DE " + this.solicitud.tipo;

        let html = "";

        html += `
            <label>Empleado</label>
            <div>${datos.empleado.nombre}</div>

            <label>Cédula</label>
            <div>${datos.empleado.cedula}</div>

            <label>Cargo</label>
            <div>${datos.empleado.cargo}</div>

            <label>Ubicación</label>
            <div>${datos.empleado.ubicacion}</div>

            <label>Equipos</label>

            <ul class="listaEquipos">
        `;

        datos.equipos.forEach(eq => {

            html += `
                <li>

                    ${eq.id}

                    -

                    ${eq.descripcion}

                </li>
            `;

        });

        html += "</ul>";

        html += `

            <label>Observaciones</label>

            <div>

                ${datos.observaciones || "Sin observaciones."}

            </div>

            <hr style="margin:30px 0;">

            <button
                id="btnContinuar">

                Revisé la información y deseo firmar

            </button>

        `;

        document.getElementById("contenido").innerHTML = html;

        document
            .getElementById("btnContinuar")
            .onclick = () => this.mostrarCanvas();

    },

    mostrarCanvas() {

        document.getElementById("contenido").innerHTML = `

            <h2>

                Firma Digital

            </h2>

            <p>

                Firme dentro del recuadro.

            </p>

            <canvas id="canvasFirma"></canvas>

            <div class="botones">

                <button id="btnLimpiar">

                    Limpiar

                </button>

                <button id="btnFirmar">

                    Firmar

                </button>

            </div>

        `;

        this.inicializarCanvas();

    },

    inicializarCanvas() {

        const canvas = document.getElementById("canvasFirma");

        const ctx = canvas.getContext("2d");

        const rect = canvas.getBoundingClientRect();

        canvas.width = rect.width;

        canvas.height = rect.height;

        ctx.lineWidth = 2;

        ctx.lineCap = "round";

        ctx.strokeStyle = "#000";

        let dibujando = false;

        let firmo = false;

        this.canvas = canvas;

        this.ctx = ctx;

        this.firmo = false;

        const obtenerPosicion = (e) => {

            if (e.touches) {

                return {

                    x: e.touches[0].clientX - rect.left,

                    y: e.touches[0].clientY - rect.top

                };

            }

            return {

                x: e.offsetX,

                y: e.offsetY

            };

        };

        const iniciar = (e) => {

            dibujando = true;

            firmo = true;

            this.firmo = true;

            const p = obtenerPosicion(e);

            ctx.beginPath();

            ctx.moveTo(p.x, p.y);

        };

        const mover = (e) => {

            if (!dibujando) return;

            e.preventDefault();

            const p = obtenerPosicion(e);

            ctx.lineTo(p.x, p.y);

            ctx.stroke();

        };

        const finalizar = () => {

            dibujando = false;

        };

        canvas.addEventListener("mousedown", iniciar);

        canvas.addEventListener("mousemove", mover);

        canvas.addEventListener("mouseup", finalizar);

        canvas.addEventListener("mouseleave", finalizar);

        canvas.addEventListener("touchstart", iniciar);

        canvas.addEventListener("touchmove", mover);

        canvas.addEventListener("touchend", finalizar);

        document.getElementById("btnLimpiar")

            .onclick = () => this.limpiar();

        document.getElementById("btnFirmar")

            .onclick = () => this.firmar();

    },

    limpiar() {

        this.ctx.clearRect(

            0,

            0,

            this.canvas.width,

            this.canvas.height

        );

        this.firmo = false;

    },

    firmar() {

        if (!this.firmo) {

            alert("Debe realizar la firma antes de continuar.");

            return;

        }

        const base64 = this.canvas.toDataURL("image/png");

        console.log(base64);

        alert(

            "Firma capturada correctamente.\n\n" +

            "En el siguiente sprint será enviada al servidor."

        );

    }

};

window.onload = () => {

    Firma.iniciar();

};

</script>
