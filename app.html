<script>

const App = {

    vistaActual: "entrega",

    iniciar() {

        this.mostrarVista("entrega");

        Entrega.cargarPersonal();

    },

    mostrarVista(vista) {

        document.getElementById("entrega").style.display = "none";
        document.getElementById("devolucion").style.display = "none";
        document.getElementById("consulta").style.display = "none";

        document.getElementById(vista).style.display = "block";

        document.querySelectorAll(".menu").forEach(btn => {

            btn.classList.remove("activo");

        });

        if(vista=="entrega")
            document.getElementById("btnEntrega").classList.add("activo");

        if(vista=="devolucion")
            document.getElementById("btnDevolucion").classList.add("activo");

        if(vista=="consulta")
            document.getElementById("btnConsulta").classList.add("activo");

        this.vistaActual = vista;

    },

    seleccionarEmpleado(){

        Entrega.seleccionarEmpleado();

    },

    agregarEquipo(){

        Entrega.agregarEquipo();

    },

    registrarEntrega(){

        Entrega.registrar();

    }

};

window.onload=()=>{

    App.iniciar();

};

</script>
