<!DOCTYPE html>
<html>

<head>

    <base target="_top">

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Firma de Acta</title>

    <style>

        *{

            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,Helvetica,sans-serif;

        }

        body{

            background:#f4f6f8;

            display:flex;

            justify-content:center;

            align-items:center;

            min-height:100vh;

        }

        .contenedor{

            width:95%;

            max-width:900px;

            background:white;

            border-radius:12px;

            box-shadow:0 5px 20px rgba(0,0,0,.15);

            padding:30px;

        }

        h1{

            color:#1565C0;

            margin-bottom:10px;

        }

        p{

            color:#666;

            margin-bottom:25px;

        }

        #panelFirma{

            border:2px dashed #1565C0;

            border-radius:10px;

            overflow:hidden;

            background:white;

        }

        canvas{

            width:100%;

            height:350px;

            display:block;

            touch-action:none;

            cursor:crosshair;

        }

        .botones{

            display:flex;

            justify-content:flex-end;

            gap:15px;

            margin-top:20px;

        }

        button{

            border:none;

            padding:14px 28px;

            border-radius:8px;

            cursor:pointer;

            color:white;

            font-size:15px;

            transition:.2s;

        }

        #btnLimpiar{

            background:#E53935;

        }

        #btnLimpiar:hover{

            background:#C62828;

        }

        #btnGuardar{

            background:#43A047;

        }

        #btnGuardar:hover{

            background:#2E7D32;

        }

        #estado{

            margin-top:25px;

            padding:15px;

            display:none;

            border-radius:8px;

            background:#E3F2FD;

            color:#1565C0;

        }

        @media(max-width:700px){

            canvas{

                height:260px;

            }

            .botones{

                flex-direction:column;

            }

            button{

                width:100%;

            }

        }

    </style>

</head>

<body>

<div class="contenedor">

    <h1>Firma del Acta</h1>

    <p>

        Lea el documento previamente y firme en el espacio inferior.

    </p>

    <div id="resumenSolicitud">

      <h2>Empleado</h2>

      <div id="datosEmpleado"></div>

      <h2 style="margin-top:25px;">

          Equipos

      </h2>

      <table id="tablaResumen">

          <thead>

              <tr>

                  <th>ID</th>

                  <th>Descripción</th>

              </tr>

          </thead>

          <tbody>

          </tbody>

      </table>

  </div>

    <div id="panelFirma">

        <canvas id="canvasFirma"></canvas>

    </div>

    <div class="botones">

        <button id="btnLimpiar">

            Limpiar

        </button>

        <button id="btnGuardar">

            Guardar Firma

        </button>

    </div>

    <div id="estado">

        Preparando...

    </div>

</div>

<script>

const token = "<?= token ?>";
const solicitud = JSON.parse(
      '<?= solicitud ?>'
  );

if(!token){

    alert("No se recibió el token de la solicitud.");

}

const canvas = document.getElementById("canvasFirma");
const ctx = canvas.getContext("2d");

const estado = document.getElementById("estado");

let dibujando = false;
let hayFirma = false;



function cargarResumen(){

    const empleado = solicitud.datos.empleado;

    document.getElementById(
        "datosEmpleado"
    ).innerHTML=`

        <b>${empleado.nombre}</b><br>

        ${empleado.cedula}<br>

        ${empleado.cargo}

    `;

    const tbody=document.querySelector(

        "#tablaResumen tbody"

    );

    tbody.innerHTML="";

    solicitud.datos.equipos.forEach(eq=>{

        tbody.innerHTML+=`

        <tr>

            <td>${eq.id}</td>

            <td>${eq.descripcion}</td>

        </tr>

        `;

    });

}

/*=========================================
  Ajustar tamaño
=========================================*/

function ajustarCanvas(){

    const rect = canvas.getBoundingClientRect();

    canvas.width = rect.width;

    canvas.height = rect.height;

    configurarLapiz();

}

window.addEventListener("resize", ajustarCanvas);

function configurarLapiz(){

    ctx.lineWidth = 2.5;

    ctx.lineCap = "round";

    ctx.lineJoin = "round";

    ctx.strokeStyle = "#000";

}

/*=========================================
  Obtener coordenadas
=========================================*/

function obtenerPosicion(event){

    const rect = canvas.getBoundingClientRect();

    if(event.touches){

        return{

            x:event.touches[0].clientX-rect.left,

            y:event.touches[0].clientY-rect.top

        };

    }

    return{

        x:event.clientX-rect.left,

        y:event.clientY-rect.top

    };

}

/*=========================================
  Iniciar dibujo
=========================================*/

function iniciar(event){

    event.preventDefault();

    dibujando=true;

    hayFirma=true;

    const pos=obtenerPosicion(event);

    ctx.beginPath();

    ctx.moveTo(pos.x,pos.y);

}

/*=========================================
  Dibujar
=========================================*/

function mover(event){

    if(!dibujando) return;

    event.preventDefault();

    const pos=obtenerPosicion(event);

    ctx.lineTo(pos.x,pos.y);

    ctx.stroke();

}

/*=========================================
  Finalizar
=========================================*/

function finalizar(event){

    event.preventDefault();

    dibujando=false;

}

/*=========================================
  Mouse
=========================================*/

canvas.addEventListener("mousedown",iniciar);

canvas.addEventListener("mousemove",mover);

canvas.addEventListener("mouseup",finalizar);

canvas.addEventListener("mouseleave",finalizar);

/*=========================================
  Touch
=========================================*/

canvas.addEventListener("touchstart",iniciar);

canvas.addEventListener("touchmove",mover);

canvas.addEventListener("touchend",finalizar);

/*=========================================
  Limpiar
=========================================*/

document
.getElementById("btnLimpiar")
.addEventListener("click",()=>{

    ctx.clearRect(

        0,

        0,

        canvas.width,

        canvas.height

    );

    configurarLapiz();

    hayFirma=false;

});

/*=========================================
  Guardar
=========================================*/

document
.getElementById("btnGuardar")
.addEventListener("click",()=>{

    if(!hayFirma){

        alert("Debe realizar una firma.");

        return;

    }

    document.getElementById("btnGuardar").disabled=true;
    document.getElementById("btnLimpiar").disabled=true;

    estado.style.display="block";

    estado.innerHTML="Guardando firma...";

    const base64 = canvas.toDataURL("image/png");

    google.script.run

        .withSuccessHandler(function(){

            estado.innerHTML="Generando acta...";

            if(solicitud.tipo=="ENTREGA"){

              google.script.run

                  .withSuccessHandler(finalizarProceso)

                  .withFailureHandler(errorProceso)

                  .finalizarEntrega(token);

          }else{

              google.script.run

                  .withSuccessHandler(finalizarProceso)

                  .withFailureHandler(errorProceso)

                  .finalizarDevolucion(token);

          }

        })

        .withFailureHandler(errorProceso)

        .procesarFirma(

            token,

            base64

        );

});


function finalizarProceso(respuesta){

    estado.innerHTML=`

        <h3 style="color:green;">

            ✔ Acta generada correctamente

        </h3>

        <br>

        <a href="${respuesta.pdf.url}"

           target="_blank">

           Abrir PDF

        </a>

        <br><br>

        <button onclick="volver()">

            Finalizar

        </button>

    `;

}

function errorProceso(error){

    document.getElementById("btnGuardar").disabled=false;

    document.getElementById("btnLimpiar").disabled=false;

    estado.innerHTML=`

        <span style="color:red;">

            ${error.message}

        </span>

    `;

}

function volver(){

    window.location.href=

        window.location.origin+

        window.location.pathname;

}

/*=========================================
  Inicializar
=========================================*/

cargarResumen();

ajustarCanvas();

estado.style.display="block";

estado.innerHTML=

    "Solicitud: "+token;

</script>

</body>

</html>
