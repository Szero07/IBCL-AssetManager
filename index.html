        <div class="card">

            <label>Empleado</label>

            <select id="empleado" onchange="App.seleccionarEmpleado()">

                <option value="">Cargando empleados...</option>

            </select>

            <div class="grid2">

                <div>

                    <label>Cédula</label>

                    <input id="cedula" readonly>

                </div>

                <div>

                    <label>Cargo</label>

                    <input id="cargo" readonly>

                </div>

            </div>

            <label>Ubicación</label>

            <input id="ubicacion" readonly>

        </div>

        <!-- Equipos -->

        <div class="card">

            <h2>💻 Equipos</h2>

            <div class="fila">

                <div class="grow">

                    <label>Código</label>

                    <input
                        id="codigoEquipo"

                    <button
                        style="margin-top:28px;"
                        onclick="App.agregarEquipo()">

                    </button>

                </div>

            </div>

            <table id="tablaEquipos">

                <thead>

                    <tr>

                        <th>Código</th>

                        <th>Descripción</th>

                        <th>Marca</th>

                        <th>Modelo</th>

                        <th></th>

                    </tr>

                </thead>

                <tbody>

                </tbody>

            </table>

        </div>

        <!-- Observaciones -->

        <div class="card">

            <h2>📝 Observaciones</h2>

            <textarea
                id="observaciones"
                rows="4"></textarea>

        </div>

        <!-- Registrar -->

        <div class="card">

            <button
                class="btnVerde"
                onclick="App.registrarEntrega()">

                Registrar Entrega

            </button>

        </div>

    </section>

        <!-- ===================== -->

        </section>

        <!-- ===================== -->

        <section id="consulta"

            <div class="card">
