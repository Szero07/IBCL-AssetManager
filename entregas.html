<script>

const Entrega={

    empleado:null,

    urlWebApp:null,

    equipos:[],

    cargarPersonal(){

        google.script.run
        .withSuccessHandler(lista=>{

            const combo=document.getElementById("empleado");

            combo.innerHTML="<option value=''>Seleccione...</option>";

            lista.forEach(emp=>{

                combo.innerHTML+=`
                    <option value="${emp.id}">
                        ${emp.nombre}
                    </option>
                `;

            });

        })
        
        .obtenerPersonal();

        const input = document.getElementById("codigoEquipo");

        input.addEventListener("keydown",(e)=>{

            if(e.key==="Enter"){

                e.preventDefault();

                Entrega.agregarEquipo();

            }

        });

        google.script.run
        .withSuccessHandler(url=>{

            this.urlWebApp=url;

        })
        .obtenerURLWebApp();

    },

    seleccionarEmpleado(){

        const id=document.getElementById("empleado").value;

        if(id==""){

            this.empleado=null;

            document.getElementById("cedula").value="";
            document.getElementById("cargo").value="";
            document.getElementById("ubicacion").value="";
            this.actualizarEstadoFormulario();

            return;

        }

        google.script.run

        .withSuccessHandler(emp=>{

            this.empleado=emp;

            document.getElementById("cedula").value=emp.cedula;

            document.getElementById("cargo").value=emp.cargo;

            document.getElementById("ubicacion").value=emp.ubicacion;
            this.actualizarEstadoFormulario();

        })

        .obtenerEmpleado(id);

    },

    agregarEquipo(){

        const codigo=document
            .getElementById("codigoEquipo")
            .value
            .trim()
            .toUpperCase();

        if(codigo=="") return;

        if(this.equipos.some(e=>e.id==codigo)){

            alert("Ese equipo ya fue agregado.");

            return;

        }

        google.script.run

        .withSuccessHandler(equipo=>{

            if(!equipo){

                alert("Equipo no encontrado.");

                return;

            }

            if(equipo.estado=="Asignado"){

                alert("El equipo ya está asignado.");

                return;

            }

            this.equipos.push(equipo);

            this.actualizarTabla();
            this.actualizarEstadoFormulario();

            document.getElementById("codigoEquipo").value="";

            document.getElementById("codigoEquipo").focus();

        })

        .buscarEquipo(codigo);

    },

    actualizarTabla(){

        const tbody=document.querySelector("#tablaEquipos tbody");

        tbody.innerHTML="";

        this.equipos.forEach((eq,i)=>{

            tbody.innerHTML+=`

            <tr>

                <td>${eq.id}</td>

                <td>${eq.descripcion}</td>

                <td>${eq.marca}</td>

                <td>${eq.modelo}</td>

                <td>

                    <button class="btnEliminar"

                        onclick="Entrega.eliminarEquipo(${i})">

                        X

                    </button>

                </td>

            </tr>

            `;

        });

    },

    eliminarEquipo(indice){

        this.equipos.splice(indice,1);

        this.actualizarTabla();
        this.actualizarEstadoFormulario();

    },

    registrar(){

        if(!this.empleado){

            alert("Seleccione un empleado.");

            return;

        }

        if(this.equipos.length===0){

            alert("Debe agregar al menos un equipo.");

            return;

        }

        const datos={

            empleadoId:this.empleado.id,

            equipos:this.equipos.map(e=>e.id),

            observaciones:document
                .getElementById("observaciones")
                .value
                .trim()

        };

        const boton=document.getElementById("btnRegistrarEntrega");

        boton.disabled=true;

        boton.innerHTML="Creando solicitud...";

        google.script.run

            .withSuccessHandler((resultado)=>{

                if(!resultado.ok){

                    boton.disabled=false;

                    boton.innerHTML="Registrar Entrega";

                    alert(resultado.mensaje);

                    return;

                }

                this.mostrarSolicitud(resultado);

                boton.disabled=false;

                boton.innerHTML="Registrar Entrega";

            })

            .withFailureHandler((error)=>{

                boton.disabled=false;

                boton.innerHTML="Registrar Entrega";

                alert(error.message);

            })

            .registrarEntrega(datos);

    },




    mostrarSolicitud(resultado){

        const url = this.urlWebApp + "?token=" + resultado.token;

        // Empleado
        document.getElementById("modalEmpleado").innerHTML = `
            <strong>${this.empleado.nombre}</strong><br>
            ${this.empleado.cargo}<br>
            ${this.empleado.cedula}
        `;

        // Equipos
        let htmlEquipos = "";

        this.equipos.forEach(eq => {

            htmlEquipos += `
                <div class="itemEquipo">
                    <strong>${eq.id}</strong><br>
                    ${eq.descripcion}<br>
                    ${eq.marca} ${eq.modelo}
                </div>
            `;

        });

        document.getElementById("modalEquipos").innerHTML = htmlEquipos;

        // Token
        document.getElementById("tokenSolicitud").value =
            resultado.token;

        // URL
        document.getElementById("urlSolicitud").value =
            url;

        // QR
        document.getElementById("qrSolicitud").src =
            "https://quickchart.io/qr?size=220&text=" +
            encodeURIComponent(url);

        // Mostrar modal
        document
            .getElementById("modalSolicitud")
            .classList.remove("oculto");

    },




    abrirSolicitud(){

        window.open(

            document.getElementById(

                "urlSolicitud"

            ).value,

            "_blank"

        );

    },

    enviarWhatsApp(){

        const url = document.getElementById(
            "urlSolicitud"
        ).value;

        const mensaje =

    `Hola.

    Se ha generado una solicitud de entrega de activos de IBCL.

    Por favor revise la información y firme el acta en el siguiente enlace:

    ${url}`;

        window.open(

            "https://wa.me/?text="+

            encodeURIComponent(mensaje),

            "_blank"

        );

  },



  enviarCorreo(){

        const url = document.getElementById(
            "urlSolicitud"
        ).value;

        const asunto =
            "Firma de acta de entrega de activos";

        const cuerpo =

    `Buen día.

    Se ha generado una solicitud de entrega de activos.

    Puede revisar la información y firmar el documento en el siguiente enlace:

    ${url}

    Gracias.`;

        window.location.href=

            "mailto:?subject="+

            encodeURIComponent(asunto)+

            "&body="+

            encodeURIComponent(cuerpo);

  },


    cerrarModal(){

        document

            .getElementById("modalSolicitud")

            .classList.add("oculto");

        this.limpiar();

    },


    limpiar(){

        this.equipos=[];

        this.actualizarTabla();

        document.getElementById("codigoEquipo").value="";

        document.getElementById("observaciones").value="";

        document.getElementById("empleado").selectedIndex=0;

        document.getElementById("cedula").value="";

        document.getElementById("cargo").value="";

        document.getElementById("ubicacion").value="";

        this.empleado=null;

        this.actualizarEstadoFormulario();

        document.getElementById("codigoEquipo").focus();

    },


    actualizarEstadoFormulario(){

    document.getElementById("contadorEquipos").innerText=this.equipos.length;

    const habilitar=

        this.empleado!=null &&

        this.equipos.length>0;

    document.getElementById("btnRegistrarEntrega").disabled=!habilitar;

}

};

</script>
