<script>

const Devolucion={

    equipos:[],

    responsable:null,
    
    urlWebApp:null,

    iniciar(){

      console.log("Inicializando devolución");

      const input=document.getElementById("codigoDevolucion");

      console.log(input);

      input.addEventListener("keydown",(e)=>{

          console.log("Tecla:",e.key);

          if(e.key==="Enter"){

              console.log("ENTER");

              e.preventDefault();

              Devolucion.agregarEquipo();

          }

      });

      google.script.run
      .withSuccessHandler(url=>{

          this.urlWebApp = url;

      })
      .obtenerURLWebApp();

  },

    agregarEquipo(){

        const codigo=document
            .getElementById("codigoDevolucion")
            .value
            .trim()
            .toUpperCase();

        if(codigo=="")
            return;

        if(this.equipos.some(e=>e.id==codigo)){

            alert("Ese equipo ya fue agregado.");

            return;

        }

        google.script.run

        .withSuccessHandler(equipo=>{

            if(!equipo){

                alert("Equipo no encontrado.");

                return;

            }

            if(equipo.estado!="Asignado"){

                alert("El equipo no se encuentra asignado.");

                return;

            }

            google.script.run

            .withSuccessHandler(empleado=>{

                if(!empleado){

                    alert("No fue posible identificar al responsable.");

                    return;

                }

                this.responsable=empleado;

                this.equipos.push(equipo);

                this.actualizarResponsable();

                this.actualizarTabla();

                this.actualizarEstadoFormulario();

                document.getElementById("codigoDevolucion").value="";

                document.getElementById("codigoDevolucion").focus();

            })

            .obtenerEmpleadoPorTexto(equipo.utilizado);

        })

        .buscarEquipo(codigo);

    },



    actualizarResponsable(){

        if(!this.responsable)
            return;

        document.getElementById("devNombre").value=this.responsable.nombre;

        document.getElementById("devCedula").value=this.responsable.cedula;

        document.getElementById("devCargo").value=this.responsable.cargo;

        document.getElementById("devUbicacion").value=this.responsable.ubicacion;

    },


    actualizarEstadoFormulario(){

        document.getElementById("contadorDevolucion").innerText=this.equipos.length;

        document.getElementById("btnRegistrarDevolucion").disabled=

            this.equipos.length==0;

    },

    actualizarTabla(){

        const tbody=document.querySelector("#tablaDevolucion tbody");

        tbody.innerHTML="";

        this.equipos.forEach((eq,i)=>{

            tbody.innerHTML+=`

            <tr>

                <td>${eq.id}</td>

                <td>${eq.descripcion}</td>

                <td>${eq.marca}</td>

                <td>${eq.modelo}</td>

                <td>

                    <button

                        class="btnEliminar"

                        onclick="Devolucion.eliminarEquipo(${i})">

                        X

                    </button>

                </td>

            </tr>

            `;

        });

    },

    eliminarEquipo(indice){

        this.equipos.splice(indice,1);

        if(this.equipos.length===0){

            this.responsable=null;

            document.getElementById("devNombre").value="";
            document.getElementById("devCedula").value="";
            document.getElementById("devCargo").value="";
            document.getElementById("devUbicacion").value="";

        }

        this.actualizarTabla();

        this.actualizarEstadoFormulario();

    },

    registrar(){

      if(this.equipos.length===0){

          alert("Debe agregar al menos un equipo.");

          return;

      }

      const datos={

          equipos:this.equipos.map(e=>e.id),

          observaciones:document

              .getElementById("observacionesDevolucion")

              .value

              .trim()

      };

      const boton=document.getElementById(

          "btnRegistrarDevolucion"

      );

      boton.disabled=true;

      boton.innerHTML="Creando solicitud...";

      google.script.run

      .withSuccessHandler(resultado=>{

          if(!resultado.ok){

              boton.disabled=false;

              boton.innerHTML="Registrar Devolución";

              alert(resultado.mensaje);

              return;

          }

          const url =

              this.urlWebApp +

              "?token=" +

              resultado.token;

          document

              .getElementById("modalEmpleado")

              .innerHTML=`

                  <strong>${this.responsable.nombre}</strong><br>

                  ${this.responsable.cargo}<br>

                  ${this.responsable.cedula}

              `;

          let html="";

          this.equipos.forEach(eq=>{

              html+=`

                  <div class="itemEquipo">

                      <strong>${eq.id}</strong><br>

                      ${eq.descripcion}<br>

                      ${eq.marca} ${eq.modelo}

                  </div>

              `;

          });

          document

              .getElementById("modalEquipos")

              .innerHTML=html;

          document

              .getElementById("tokenSolicitud")

              .value=resultado.token;

          document

              .getElementById("urlSolicitud")

              .value=url;

          document

              .getElementById("qrSolicitud")

              .src=

              "https://quickchart.io/qr?size=220&text="+

              encodeURIComponent(url);

          document

              .getElementById("modalSolicitud")

              .classList.remove("oculto");

          boton.disabled=false;

          boton.innerHTML="Registrar Devolución";

      })

      .withFailureHandler(error=>{

          boton.disabled=false;

          boton.innerHTML="Registrar Devolución";

          alert(error.message);

      })

      .registrarDevolucion(datos);

  },




    mostrarSolicitud(resultado){

        const url=this.urlWebApp+"?token="+resultado.token;

        document.getElementById("modalEmpleado").innerHTML=`

            <strong>${this.responsable.nombre}</strong><br>

            ${this.responsable.cargo}<br>

            ${this.responsable.cedula}

        `;

        let html="";

        this.equipos.forEach(eq=>{

            html+=`

                <div class="itemEquipo">

                    <strong>${eq.id}</strong><br>

                    ${eq.descripcion}<br>

                    ${eq.marca} ${eq.modelo}

                </div>

            `;

        });

        document.getElementById("modalEquipos").innerHTML=html;

        document.getElementById("tokenSolicitud").value=resultado.token;

        document.getElementById("urlSolicitud").value=url;

        document.getElementById("qrSolicitud").src=

            "https://quickchart.io/qr?size=220&text="+

            encodeURIComponent(url);

        document.getElementById("modalSolicitud")

            .classList.remove("oculto");

    },




    limpiar(){

        this.equipos=[];

        this.responsable=null;

        this.actualizarTabla();

        this.actualizarEstadoFormulario();

        document.getElementById("codigoDevolucion").value="";

        document.getElementById("observacionesDevolucion").value="";

        document.getElementById("devNombre").value="";

        document.getElementById("devCedula").value="";

        document.getElementById("devCargo").value="";

        document.getElementById("devUbicacion").value="";

        document.getElementById("codigoDevolucion").focus();

    }

};

</script>
